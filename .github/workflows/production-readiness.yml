name: Production Readiness

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: production-readiness
  cancel-in-progress: false

jobs:
  production-readiness:
    name: Production readiness Playwright
    runs-on: ubuntu-latest
    env:
      E2E_PROD_BASE_URL: ${{ secrets.E2E_PROD_BASE_URL }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run Hugo-only public auth checks and emit manual gates
        run: npm run test:prod:readiness

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: production-readiness-playwright-report
          path: playwright-report/
          if-no-files-found: ignore

      - name: Upload Playwright test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: production-readiness-test-results
          path: test-results/
          if-no-files-found: ignore
