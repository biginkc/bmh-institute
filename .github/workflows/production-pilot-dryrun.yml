name: Production Pilot Dry Run

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: production-pilot-dryrun
  cancel-in-progress: false

jobs:
  dryrun:
    name: Production pilot dry run
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      E2E_PROD_BASE_URL: ${{ secrets.E2E_PROD_BASE_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install browser
        run: npx playwright install --with-deps chromium

      - name: Emit Hugo pilot manual-acceptance gate
        run: npm run test:prod:dryrun

      - name: Upload dry-run artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: production-pilot-dryrun-artifacts
          path: |
            test-results/
            playwright-report/
          if-no-files-found: ignore
