name: Production Pilot Dry Run

on:
  workflow_dispatch:
  schedule:
    - cron: "17 13 * * 1"

concurrency:
  group: production-pilot-dryrun
  cancel-in-progress: false

jobs:
  dryrun:
    name: Production pilot dry run
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      E2E_PROD_BASE_URL: ${{ secrets.E2E_PROD_BASE_URL }}
      TEST_SUPABASE_URL: ${{ secrets.PROD_SUPABASE_URL }}
      TEST_SUPABASE_ANON_KEY: ${{ secrets.PROD_SUPABASE_ANON_KEY }}
      TEST_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.PROD_SUPABASE_SERVICE_ROLE_KEY }}
      PROD_READINESS_TEST_PASSWORD: ${{ secrets.PROD_READINESS_TEST_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install browser
        run: npx playwright install --with-deps chromium

      - name: Run production pilot dry run
        run: npm run test:prod:dryrun

      - name: Upload dry-run artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: production-pilot-dryrun-artifacts
          path: |
            test-results/
            playwright-report/
          if-no-files-found: ignore
