name: Apply Supabase migrations to test

on:
  workflow_dispatch: {}
  pull_request:
    branches: [main]
    paths:
      - "supabase/migrations/**"
      - "supabase/tests/**"
      - "src/**/*.integration.test.ts"
      - "src/lib/course-import/provider-acceptance.ts"
      - "scripts/test-course-import-provider.ts"
      - "package.json"
      - ".github/workflows/db-migrate-test.yml"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  migrate-test:
    name: Apply migrations to BMH test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    concurrency:
      group: bmh-institute-seeded-e2e-shared-test-project
      cancel-in-progress: false

    env:
      TEST_PROJECT_REF: jvaabkchkihkjllehmft
      TEST_SUPABASE_URL: ${{ secrets.TEST_SUPABASE_URL }}
      TEST_SUPABASE_ANON_KEY: ${{ secrets.TEST_SUPABASE_ANON_KEY }}
      TEST_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.TEST_SUPABASE_SERVICE_ROLE_KEY }}

    steps:
      - uses: actions/checkout@v5

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install --yes postgresql-client

      - name: Apply pending migrations
        env:
          TEST_SUPABASE_DB_PASSWORD: ${{ secrets.TEST_SUPABASE_DB_PASSWORD }}
        run: |
          if [ -z "$TEST_SUPABASE_DB_PASSWORD" ]; then
            echo "TEST_SUPABASE_DB_PASSWORD secret is required."
            exit 1
          fi

          ENCODED_PASSWORD="$(node -e 'process.stdout.write(encodeURIComponent(process.env.TEST_SUPABASE_DB_PASSWORD))')"
          DB_URL="postgresql://postgres.${TEST_PROJECT_REF}:${ENCODED_PASSWORD}@aws-1-us-west-1.pooler.supabase.com:5432/postgres"
          supabase db push --include-all --db-url "$DB_URL" --yes

      - name: Install dependencies
        run: npm ci

      - name: Run versioned completion Postgres acceptance
        env:
          TEST_SUPABASE_DB_PASSWORD: ${{ secrets.TEST_SUPABASE_DB_PASSWORD }}
        run: |
          ENCODED_PASSWORD="$(node -e 'process.stdout.write(encodeURIComponent(process.env.TEST_SUPABASE_DB_PASSWORD))')"
          DB_URL="postgresql://postgres.${TEST_PROJECT_REF}:${ENCODED_PASSWORD}@aws-1-us-west-1.pooler.supabase.com:5432/postgres"
          psql "$DB_URL" --set ON_ERROR_STOP=1 --file supabase/tests/031_versioned_video_completion_and_submission_evidence.sql

      - name: Run fail-closed provider acceptance against migrated test database
        run: npm run test:course-import-provider
