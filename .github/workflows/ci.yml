name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set up uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2

      - name: Install dependencies
        run: npm ci

      - name: Install PDF inspection tools
        run: sudo apt-get update && sudo apt-get install --yes poppler-utils

      - name: Run typecheck, unit, and RTL tests
        run: npm run verify

      - name: Run course-content tests and deterministic guide rebuild
        run: npm run test:course-content

      - name: Run artwork production workflow tests
        run: npm run test:artwork-production

  e2e:
    name: Seeded Playwright E2E
    runs-on: ubuntu-latest
    needs: verify
    concurrency:
      group: bmh-institute-seeded-e2e-shared-test-project
      cancel-in-progress: false
    env:
      TEST_SUPABASE_URL: ${{ secrets.TEST_SUPABASE_URL }}
      TEST_SUPABASE_ANON_KEY: ${{ secrets.TEST_SUPABASE_ANON_KEY }}
      TEST_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.TEST_SUPABASE_SERVICE_ROLE_KEY }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Create one-run E2E credential
        shell: bash
        run: |
          E2E_PASSWORD="$(openssl rand -base64 36 | tr -d '\n')"
          echo "::add-mask::${E2E_PASSWORD}"
          echo "E2E_SEED_PASSWORD=${E2E_PASSWORD}" >> "${GITHUB_ENV}"

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Seed E2E content
        run: npm run seed:e2e

      - name: Run Playwright E2E
        run: npm run test:e2e

      - name: Remove seeded E2E accounts and content
        if: always()
        run: npm run cleanup:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: ignore
